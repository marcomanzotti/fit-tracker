name: Build unsigned IPA

# Builds the app on a free Apple cloud Mac and uploads an UNSIGNED .ipa.
# SideStore re-signs it on your iPhone, so we deliberately disable signing here.

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:        # lets you trigger a build by hand from the Actions tab

jobs:
  build:
    runs-on: macos-15        # this image ships Xcode 16 (needed for the project format)
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project FitTracker.xcodeproj \
            -scheme FitTracker \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package into unsigned .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/FitTracker.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Built .app not found at $APP_PATH"
            ls -R build/Build/Products || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r FitTracker.ipa Payload >/dev/null
          rm -rf Payload
          echo "Created FitTracker.ipa:"
          ls -lh FitTracker.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitTracker-ipa
          path: ios/FitTracker.ipa
          if-no-files-found: error
